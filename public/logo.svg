<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Shield bottom curve -->
  <path
    d="M 18 38 L 18 68 Q 18 94 60 104 Q 102 94 102 68 L 102 38"
    stroke="rgba(34,211,238,0.45)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
  <!-- Shield top: left arm → center peak → right arm -->
  <polyline
    points="13,38  44,38  60,22  76,38  107,38"
    stroke="rgba(34,211,238,0.45)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
  <!-- EKG flat baseline -->
  <line
    x1="24" y1="63" x2="86" y2="63"
    stroke="rgba(34,211,238,0.55)" stroke-width="3.5" stroke-linecap="round"
  />
  <!-- EKG spike (bright cyan) -->
  <polyline
    points="38,63  47,45  57,63"
    stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"
  />
  <!-- Green endpoint dot -->
  <circle cx="86" cy="63" r="10" fill="#00ff88"/>
  <circle cx="86" cy="63" r="10" stroke="rgba(0,0,0,0.3)" stroke-width="2" fill="none"/>
</svg>
